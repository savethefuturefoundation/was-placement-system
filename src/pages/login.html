<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — WAAPC Placement System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --ink: #0f1117; --gold: #c8943a; --teal: #1d6b6e; --paper: #f5f0e8; --white: #fff; --border: #d4cfc4; --muted: #7a7468; --err: #c0392b; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-card { background: var(--white); max-width: 420px; width: 100%; padding: 3rem; border-top: 4px solid var(--gold); }
  .school-tag { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.5rem; }
  .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.35rem; }
  input { width: 100%; border: 1.5px solid var(--border); padding: 0.75rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; background: var(--paper); transition: border-color 0.2s; }
  input:focus { border-color: var(--teal); background: var(--white); }
  .btn { width: 100%; padding: 0.9rem; background: var(--ink); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .btn:hover { background: var(--teal); }
  .btn:disabled { background: var(--border); cursor: not-allowed; }
  .error { background: #fdf2f2; border: 1px solid #fca5a5; color: var(--err); padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="school-tag">WAAPC American School</div>
  <h1>Placement System</h1>
  <p class="subtitle">Staff access only. Sign in with your school email.</p>
  <div class="error" id="errMsg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@waapc.edu" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
</div>
<script type="module">
import { signIn } from '../lib/supabase.js'
import { supabase } from '../lib/supabase.js'

// If already logged in, redirect
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html'
})

window.doLogin = async function() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('errMsg')
  err.style.display = 'none'
  if (!email || !password) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return }
  btn.disabled = true; btn.textContent = 'Signing in…'
  try {
    await signIn(email, password)
    window.location.href = 'dashboard.html'
  } catch(e) {
    err.textContent = 'Invalid email or password. Please try again.'
    err.style.display = 'block'
    btn.disabled = false; btn.textContent = 'Sign In'
  }
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin() })
</script>
</body>
</html>
