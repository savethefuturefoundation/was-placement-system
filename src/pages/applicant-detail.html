<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applicant Detail — WAAPC Placement System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1117; --gold: #c8943a; --teal: #1d6b6e;
    --paper: #f5f0e8; --cream: #ede7d4; --white: #fff;
    --border: #d4cfc4; --muted: #7a7468; --rust: #a0432a;
    --sidebar: 220px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar); background: var(--ink); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-brand { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand-tag { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.25rem; }
  .sidebar-brand-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: white; line-height: 1.3; }
  .sidebar-nav { flex: 1; padding: 1rem 0; }
  .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1.25rem; color: #8a8278; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; text-decoration: none; border-left: 3px solid transparent; }
  .nav-item:hover { color: white; background: rgba(255,255,255,0.04); }
  .nav-item.active { color: white; border-left-color: var(--gold); background: rgba(200,148,58,0.08); }
  .main { margin-left: var(--sidebar); min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  .back-link { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
  .back-link:hover { color: var(--teal); }
  .topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .content { padding: 2rem; max-width: 900px; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); font-style: italic; }
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.5rem; }
  .card { background: var(--white); border: 1px solid var(--border); padding: 1.5rem; }
  .card.full { grid-column: 1 / -1; }
  .card-title { font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teal); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--cream); }
  .info-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px dashed var(--cream); font-size: 0.88rem; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); }
  .info-value { font-weight: 500; font-family: 'DM Mono', monospace; font-size: 0.82rem; }
  .badge { display: inline-block; padding: 0.2rem 0.5rem; font-family: 'DM Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 2px; }
  .badge.pending { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
  .badge.provisional { background: #fff8e6; color: #856404; border: 1px solid #ffe08a; }
  .badge.confirmed { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
  .badge.flagged { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  .score-bar-wrap { height: 5px; background: var(--cream); border-radius: 2px; margin-top: 0.4rem; }
  .score-bar { height: 100%; border-radius: 2px; background: var(--teal); }
  .subject-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; padding: 0.15rem 0.4rem; border-radius: 2px; margin-right: 0.4rem; }
  .tag-math { background: #e8f0ff; color: #1e40af; }
  .tag-english { background: #fef3e8; color: #92400e; }
  .tag-general_paper { background: #ecfdf5; color: #065f46; }
  .token-box { background: var(--cream); border: 1px solid var(--border); padding: 0.75rem 1rem; font-family: 'DM Mono', monospace; font-size: 0.78rem; word-break: break-all; margin-top: 0.75rem; }
  .btn { padding: 0.6rem 1.25rem; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; transition: all 0.15s; }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: var(--teal); }
  .btn-secondary { background: var(--cream); color: var(--ink); border: 1px solid var(--border); margin-left: 0.5rem; }
  .btn-danger { background: var(--rust); color: white; margin-left: 0.5rem; padding: 0.6rem 1.25rem; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
  .btn-danger:hover { background: #7a1a0a; }
  .alert { padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  .alert.success { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
  .alert.error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .action-bar { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
  .upload-area { border: 2px dashed var(--border); padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-top: 0.75rem; }
  .upload-area:hover { border-color: var(--teal); background: #f0f9f9; }
  .upload-area input { display: none; }
  .upload-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .upload-text { font-size: 0.85rem; color: var(--muted); }
  .upload-progress { background: var(--cream); height: 4px; border-radius: 2px; margin-top: 0.75rem; display: none; }
  .upload-progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .transcript-file { background: var(--cream); padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; font-size: 0.85rem; }
  .transcript-file a { color: var(--teal); text-decoration: none; font-weight: 500; }
  .transcript-file a:hover { color: var(--ink); }
  @media(max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; } }
  @media(max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-tag">Placement System</div>
    <div class="sidebar-brand-name">WAAPC<br>American School</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span>📋</span> Dashboard</a>
    <a class="nav-item" href="applicant-new.html"><span>➕</span> New Applicant</a>
    <a class="nav-item" href="assessment-builder.html"><span>📝</span> Assessments</a>
    <a class="nav-item" href="placement-review.html"><span>⚖️</span> Placements</a>
  </nav>
</aside>

<main class="main">
  <div class="topbar">
    <a class="back-link" href="dashboard.html">← Dashboard</a>
    <span style="color:var(--border);">|</span>
    <h1 id="pageTitle">Applicant Detail</h1>
    <button class="btn btn-danger" id="deleteBtn" style="display:none; margin-left:auto;" onclick="deleteApplicant()">🗑 Delete Student</button>
  </div>

  <div class="content">
    <div class="alert success" id="alertSuccess"></div>
    <div class="alert error" id="alertError"></div>
    <div class="loading" id="loadingMsg">Loading applicant details…</div>
    <div id="detailContent" style="display:none;"></div>
  </div>
</main>

<script type="module">
import { supabase, requireAuth, getCurrentStaff, generatePlacementToken } from '../lib/supabase.js'

let staff = null
let applicant = null
let tokens = []

async function // ── DOCUMENTS ──
async function loadDocuments() {
  const { data: docs } = await supabase
    .from('applicant_documents')
    .select('*, staff_profiles(full_name)')
    .eq('applicant_id', applicant.id)
    .order('uploaded_at', { ascending: false })

  const container = document.getElementById('documentsList')
  if (!container) return

  if (!docs || docs.length === 0) {
    container.innerHTML = '<p style="font-size:0.85rem; color:var(--muted); font-style:italic;">No documents uploaded yet.</p>'
    return
  }

  container.innerHTML = docs.map(doc => `
    <div style="display:flex; align-items:center; justify-content:space-between; padding:0.6rem 0.85rem; background:var(--cream); margin-bottom:0.5rem;">
      <div>
        <div style="font-size:0.88rem; font-weight:500;">📄 ${doc.filename}</div>
        <div style="font-size:0.75rem; color:var(--muted);">${doc.document_type} · Uploaded by ${doc.staff_profiles?.full_name || 'Staff'} on ${new Date(doc.uploaded_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      <div style="display:flex; gap:0.5rem; align-items:center; flex-shrink:0;">
        <a href="${doc.file_url}" target="_blank" style="color:var(--teal); text-decoration:none; font-size:0.82rem; font-weight:500;">View →</a>
        ${staff?.role !== 'academic' ? `<button onclick="deleteDocument('${doc.id}', '${doc.file_path}')" style="background:none; border:none; color:var(--rust); cursor:pointer; font-size:0.82rem; padding:0.2rem 0.4rem;">✕</button>` : ''}
      </div>
    </div>
  `).join('')
}

window.uploadDocument = async function(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 10 * 1024 * 1024) { alert('File too large. Maximum 10MB.'); return }

  const docType = document.getElementById('docType').value
  const progress = document.getElementById('docUploadProgress')
  const progressFill = document.getElementById('docUploadProgressFill')
  progress.style.display = 'block'
  progressFill.style.width = '30%'

  try {
    const ext = file.name.split('.').pop()
    const path = applicant.id + '/docs/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_')

    progressFill.style.width = '60%'

    const { error: uploadError } = await supabase.storage
      .from('transcripts')
      .upload(path, file, { upsert: true })

    if (uploadError) throw uploadError

    progressFill.style.width = '80%'

    const { data: signedData } = await supabase.storage
      .from('transcripts')
      .createSignedUrl(path, 60 * 60 * 24 * 365)

    const { data: urlData } = supabase.storage.from('transcripts').getPublicUrl(path)
    const url = signedData?.signedUrl || urlData?.publicUrl

    await supabase.from('applicant_documents').insert({
      applicant_id: applicant.id,
      filename: file.name,
      file_path: path,
      file_url: url,
      document_type: docType,
      uploaded_by: staff.id
    })

    progressFill.style.width = '100%'
    input.value = ''
    setTimeout(() => { progress.style.display = 'none'; progressFill.style.width = '0%' }, 1000)
    showSuccess('Document uploaded successfully!')
    loadDocuments()

  } catch(err) {
    progress.style.display = 'none'
    alert('Upload error: ' + err.message)
  }
}

window.deleteDocument = async function(docId, filePath) {
  if (!confirm('Remove this document?')) return
  await supabase.from('applicant_documents').delete().eq('id', docId)
  await supabase.storage.from('transcripts').remove([filePath])
  showSuccess('Document removed.')
  loadDocuments()
}

window.deleteApplicant = async function() {
  if (!confirm(`Are you sure you want to permanently delete ${applicant.full_name}?\n\nThis will remove ALL their data including test results, scores, and placement decisions.\n\nThis action CANNOT be undone.`)) return
  if (!confirm(`Second confirmation: Delete ${applicant.full_name} permanently?`)) return

  try {
    const id = applicant.id
    // Delete in order to respect foreign keys
    await supabase.from('student_answers').delete().in('session_id',
      (await supabase.from('test_sessions').select('id').eq('applicant_id', id)).data?.map(s => s.id) || []
    )
    await supabase.from('test_sessions').delete().eq('applicant_id', id)
    await supabase.from('placement_decisions').delete().eq('applicant_id', id)
    await supabase.from('interview_records').delete().eq('applicant_id', id)
    await supabase.from('placement_tokens').delete().eq('applicant_id', id)
    await supabase.from('applicants').delete().eq('id', id)
    // Also delete transcript from storage if exists
    if (applicant.transcript_url) {
      const path = id + '/'
      await supabase.storage.from('transcripts').remove([path])
    }
    alert(`${applicant.full_name} has been deleted.`)
    window.location.href = 'dashboard.html'
  } catch(err) {
    showSuccess('Error deleting: ' + err.message)
  }
}

init() {
  await requireAuth()
  staff = await getCurrentStaff()
  const params = new URLSearchParams(window.location.search)
  const id = params.get('id')
  if (!id) { showError('No applicant ID provided.'); return }
  await loadApplicant(id)
}

async function loadApplicant(id) {
  const { data, error } = await supabase
    .from('applicants')
    .select(`
      *,
      placement_decisions(*),
      test_sessions(*, assessments(title, subject, grade_band)),
      interview_records(*),
      placement_tokens(*)
    `)
    .eq('id', id)
    .single()

  if (error || !data) { showError('Applicant not found.'); return }

  applicant = data
  tokens = data.placement_tokens || []
  document.getElementById('pageTitle').textContent = data.full_name
  document.getElementById('loadingMsg').style.display = 'none'
  document.getElementById('detailContent').style.display = 'block'
  // Show delete button for admins only
  if (staff && staff.role === 'admin') {
    document.getElementById('deleteBtn').style.display = 'block'
  }
  renderDetail()
}

function renderDetail() {
  const a = applicant
  const d = a.placement_decisions?.[0]
  const sessions = a.test_sessions || []
  const activeToken = tokens.find(t => !t.is_used && new Date(t.expires_at) > new Date())

  document.getElementById('detailContent').innerHTML = `
    <div class="cards-grid">

      <!-- Student Info -->
      <div class="card">
        <div class="card-title">Student Information</div>
        <div class="info-row"><span class="info-label">Full Name</span><span>${a.full_name}</span></div>
        <div class="info-row"><span class="info-label">Date of Birth</span><span class="info-value">${a.date_of_birth}</span></div>
        <div class="info-row"><span class="info-label">Age Band</span><span class="info-value">${a.age_band || '—'}</span></div>
        <div class="info-row"><span class="info-label">Nationality</span><span>${a.nationality || '—'}</span></div>
        <div class="info-row"><span class="info-label">Previous School</span><span>${a.previous_school || '—'}</span></div>
        <div class="info-row"><span class="info-label">Previous Grade</span><span>${a.previous_grade || '—'}</span></div>
        <div class="info-row"><span class="info-label">Status</span><span><span class="badge ${a.placement_status}">${a.placement_status}</span></span></div>
      </div>

      <!-- Parent Info -->
      <div class="card">
        <div class="card-title">Parent / Guardian</div>
        <div class="info-row"><span class="info-label">Name</span><span>${a.parent_name}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span style="font-size:0.82rem;">${a.parent_email}</span></div>
        <div class="info-row"><span class="info-label">Phone</span><span>${a.parent_phone || '—'}</span></div>
        <div class="info-row"><span class="info-label">Transcript</span><span>${a.transcript_available ? '✅ Received' : '⏳ Pending'}</span></div>
        ${a.notes ? `<div class="info-row"><span class="info-label">Notes</span><span style="font-size:0.82rem;">${a.notes}</span></div>` : ''}
      </div>

      <!-- Test Link -->
      <div class="card">
        <div class="card-title">Test Access Link</div>
        ${activeToken ? `
          <p style="font-size:0.85rem; color:var(--muted); margin-bottom:0.5rem;">Active link — expires ${new Date(activeToken.expires_at).toLocaleString()}</p>
          <div class="token-box" id="tokenBox">${window.location.origin}/pages/test.html?token=${activeToken.token}</div>
          <div class="action-bar">
            <button class="btn btn-primary" onclick="copyToken('${activeToken.token}')">Copy Link</button>
            ${staff?.role !== 'academic' ? `<button class="btn btn-secondary" onclick="revokeToken('${activeToken.id}')">Revoke</button>` : ''}
          </div>
        ` : `
          <p style="font-size:0.85rem; color:var(--muted); margin-bottom:0.75rem;">No active test link. Generate a new one to send to the parent.</p>
          ${staff?.role !== 'academic' ? `<button class="btn btn-primary" onclick="generateToken()">Generate New Link</button>` : '<p style="font-size:0.82rem; color:var(--muted);">Contact admissions to generate a test link.</p>'}
        `}
      </div>

      <!-- Test Sessions -->
      <div class="card">
        <div class="card-title">Test Sessions</div>
        ${sessions.length === 0 ? '<p style="font-size:0.85rem; color:var(--muted); font-style:italic;">No test sessions yet.</p>' :
          sessions.map(s => `
            <div class="info-row">
              <span><span class="subject-tag tag-${s.assessments?.subject}">${(s.assessments?.subject||'').replace('_',' ').toUpperCase()}</span></span>
              <span class="info-value">${s.status} ${s.percentage != null ? '— ' + s.percentage.toFixed(1) + '%' : ''}</span>
            </div>
            <div class="score-bar-wrap"><div class="score-bar" style="width:${s.percentage||0}%;background:${(s.percentage||0)>=65?'var(--teal)':(s.percentage||0)>=50?'var(--gold)':'var(--rust)'}"></div></div>
          `).join('<br>')}
      </div>

      <!-- Transcript Upload -->
      <div class="card full">
        <div class="card-title">Transcript</div>
        ${a.transcript_url ? `
          <div class="transcript-file">
            <span>📄 ${a.transcript_filename || 'Transcript'}</span>
            <div style="display:flex; gap:0.75rem; align-items:center;">
              <span style="font-size:0.78rem; color:var(--muted);">Uploaded ${a.transcript_uploaded_at ? new Date(a.transcript_uploaded_at).toLocaleDateString('en-GB') : ''}</span>
              <a href="${a.transcript_url}" target="_blank">View →</a>
              ${staff?.role !== 'academic' ? `<button class="btn btn-secondary" style="padding:0.3rem 0.75rem; font-size:0.78rem;" onclick="deleteTranscript()">Remove</button>` : ''}
            </div>
          </div>
        ` : `
          <p style="font-size:0.85rem; color:var(--muted); margin-bottom:0.75rem;">No transcript uploaded yet. Accepted formats: PDF, JPG, PNG (max 10MB).</p>
          ${staff?.role !== 'academic' ? `
            <div class="upload-area" onclick="document.getElementById('transcriptFile').click()">
              <input type="file" id="transcriptFile" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadTranscript(this)">
              <div class="upload-icon">📎</div>
              <div class="upload-text">Click to upload transcript</div>
            </div>
            <div class="upload-progress" id="uploadProgress">
              <div class="upload-progress-fill" id="uploadProgressFill"></div>
            </div>
          ` : '<p style="font-size:0.82rem; color:var(--muted);">Contact admissions to upload the transcript.</p>'}
        `}
      </div>

      <!-- Documents -->
      <div class="card full">
        <div class="card-title">Documents</div>
        <div id="documentsList">
          <p style="font-size:0.85rem; color:var(--muted); font-style:italic;">Loading documents…</p>
        </div>
        ${staff?.role !== 'academic' ? `
          <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--cream);">
            <div style="display:flex; gap:0.75rem; align-items:flex-end; flex-wrap:wrap;">
              <div style="flex:1; min-width:150px;">
                <label style="display:block; font-size:0.72rem; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.35rem;">Document Type</label>
                <select id="docType" style="width:100%; border:1.5px solid var(--border); padding:0.6rem 0.85rem; font-family:'DM Sans',sans-serif; font-size:0.88rem; background:var(--paper); outline:none;">
                  <option value="Report Card">Report Card</option>
                  <option value="Birth Certificate">Birth Certificate</option>
                  <option value="Passport">Passport</option>
                  <option value="Medical Record">Medical Record</option>
                  <option value="Reference Letter">Reference Letter</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div>
                <input type="file" id="docFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none;" onchange="uploadDocument(this)">
                <button class="btn btn-primary" style="padding:0.6rem 1.25rem;" onclick="document.getElementById('docFile').click()">+ Upload Document</button>
              </div>
            </div>
            <div class="upload-progress" id="docUploadProgress" style="margin-top:0.75rem;">
              <div class="upload-progress-fill" id="docUploadProgressFill"></div>
            </div>
          </div>
        ` : ''}
      </div>

      <!-- Placement Decision -->
      <div class="card full">
        <div class="card-title">Placement Decision</div>
        ${d ? `
          <div class="cards-grid" style="margin-bottom:0;">
            <div>
              <div class="info-row"><span class="info-label">System Recommendation</span><span class="info-value">${d.suggested_grade || '—'}</span></div>
              <div class="info-row"><span class="info-label">Final Grade</span><span class="info-value">${d.final_grade || '—'}</span></div>
              <div class="info-row"><span class="info-label">Status</span><span><span class="badge ${d.status}">${d.status}</span></span></div>
              ${d.flagged_reason ? `<div class="info-row"><span class="info-label">Flag</span><span style="font-size:0.8rem; color:var(--rust);">${d.flagged_reason}</span></div>` : ''}
            </div>
            <div>
              <div class="info-row"><span class="info-label">Math Score</span><span class="info-value">${d.math_score?.toFixed(1)||'—'}%</span></div>
              <div class="info-row"><span class="info-label">English Score</span><span class="info-value">${d.english_score?.toFixed(1)||'—'}%</span></div>
              <div class="info-row"><span class="info-label">Composite Score</span><span class="info-value">${d.composite_score?.toFixed(1)||'—'}%</span></div>
              <div class="score-bar-wrap"><div class="score-bar" style="width:${d.composite_score||0}%"></div></div>
            </div>
          </div>
          <div class="action-bar">
            <a href="placement-review.html" class="btn btn-primary">Open in Placement Review →</a>
          </div>
        ` : `
          <p style="font-size:0.85rem; color:var(--muted); font-style:italic;">No placement decision yet. The student must complete the test first, then run the decision engine in Placement Review.</p>
          <div class="action-bar">
            <a href="placement-review.html" class="btn btn-primary">Go to Placement Review →</a>
          </div>
        `}
      </div>

    </div>
  `
}

window.copyToken = function(token) {
  const link = window.location.origin + '/pages/test.html?token=' + token
  navigator.clipboard.writeText(link)
    .then(() => showSuccess('Link copied to clipboard!'))
    .catch(() => alert('Please copy manually: ' + link))
}

window.generateToken = async function() {
  try {
    const token = await generatePlacementToken(applicant.id, applicant.parent_email, staff.id)
    showSuccess('New test link generated!')
    await loadApplicant(applicant.id)
  } catch(err) {
    showError('Error: ' + err.message)
  }
}

window.revokeToken = async function(tokenId) {
  if (!confirm('Revoke this test link? The student will no longer be able to use it.')) return
  await supabase.from('placement_tokens').update({ is_used: true }).eq('id', tokenId)
  showSuccess('Token revoked.')
  await loadApplicant(applicant.id)
}

function showSuccess(msg) {
  const el = document.getElementById('alertSuccess')
  el.textContent = msg; el.style.display = 'block'
  setTimeout(() => el.style.display = 'none', 4000)
}

function showError(msg) {
  document.getElementById('loadingMsg').style.display = 'none'
  const el = document.getElementById('alertError')
  el.textContent = msg; el.style.display = 'block'
}

window.uploadTranscript = async function(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 10 * 1024 * 1024) {
    showSuccess('File too large. Maximum size is 10MB.')
    return
  }

  const progress = document.getElementById('uploadProgress')
  const progressFill = document.getElementById('uploadProgressFill')
  progress.style.display = 'block'
  progressFill.style.width = '30%'

  try {
    const ext = file.name.split('.').pop()
    const path = applicant.id + '/' + Date.now() + '.' + ext

    progressFill.style.width = '60%'

    const { data, error } = await supabase.storage
      .from('transcripts')
      .upload(path, file, { upsert: true })

    if (error) throw error

    progressFill.style.width = '80%'

    // Get public URL
    const { data: urlData } = supabase.storage
      .from('transcripts')
      .getPublicUrl(path)

    // Get signed URL (more secure for private bucket)
    const { data: signedData } = await supabase.storage
      .from('transcripts')
      .createSignedUrl(path, 60 * 60 * 24 * 365) // 1 year

    const url = signedData?.signedUrl || urlData?.publicUrl

    // Update applicant record
    await supabase.from('applicants').update({
      transcript_url: url,
      transcript_filename: file.name,
      transcript_available: true,
      transcript_uploaded_at: new Date().toISOString()
    }).eq('id', applicant.id)

    progressFill.style.width = '100%'
    showSuccess('Transcript uploaded successfully!')
    setTimeout(() => loadApplicant(applicant.id), 1000)

  } catch(err) {
    progress.style.display = 'none'
    showSuccess('Upload error: ' + err.message)
  }
}

window.deleteTranscript = async function() {
  if (!confirm('Remove this transcript?')) return
  await supabase.from('applicants').update({
    transcript_url: null,
    transcript_filename: null,
    transcript_available: false,
    transcript_uploaded_at: null
  }).eq('id', applicant.id)
  showSuccess('Transcript removed.')
  await loadApplicant(applicant.id)
}

// ── DOCUMENTS ──
async function loadDocuments() {
  const { data: docs } = await supabase
    .from('applicant_documents')
    .select('*, staff_profiles(full_name)')
    .eq('applicant_id', applicant.id)
    .order('uploaded_at', { ascending: false })

  const container = document.getElementById('documentsList')
  if (!container) return

  if (!docs || docs.length === 0) {
    container.innerHTML = '<p style="font-size:0.85rem; color:var(--muted); font-style:italic;">No documents uploaded yet.</p>'
    return
  }

  container.innerHTML = docs.map(doc => `
    <div style="display:flex; align-items:center; justify-content:space-between; padding:0.6rem 0.85rem; background:var(--cream); margin-bottom:0.5rem;">
      <div>
        <div style="font-size:0.88rem; font-weight:500;">📄 ${doc.filename}</div>
        <div style="font-size:0.75rem; color:var(--muted);">${doc.document_type} · Uploaded by ${doc.staff_profiles?.full_name || 'Staff'} on ${new Date(doc.uploaded_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}</div>
      </div>
      <div style="display:flex; gap:0.5rem; align-items:center; flex-shrink:0;">
        <a href="${doc.file_url}" target="_blank" style="color:var(--teal); text-decoration:none; font-size:0.82rem; font-weight:500;">View →</a>
        ${staff?.role !== 'academic' ? `<button onclick="deleteDocument('${doc.id}', '${doc.file_path}')" style="background:none; border:none; color:var(--rust); cursor:pointer; font-size:0.82rem; padding:0.2rem 0.4rem;">✕</button>` : ''}
      </div>
    </div>
  `).join('')
}

window.uploadDocument = async function(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 10 * 1024 * 1024) { alert('File too large. Maximum 10MB.'); return }

  const docType = document.getElementById('docType').value
  const progress = document.getElementById('docUploadProgress')
  const progressFill = document.getElementById('docUploadProgressFill')
  progress.style.display = 'block'
  progressFill.style.width = '30%'

  try {
    const ext = file.name.split('.').pop()
    const path = applicant.id + '/docs/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_')

    progressFill.style.width = '60%'

    const { error: uploadError } = await supabase.storage
      .from('transcripts')
      .upload(path, file, { upsert: true })

    if (uploadError) throw uploadError

    progressFill.style.width = '80%'

    const { data: signedData } = await supabase.storage
      .from('transcripts')
      .createSignedUrl(path, 60 * 60 * 24 * 365)

    const { data: urlData } = supabase.storage.from('transcripts').getPublicUrl(path)
    const url = signedData?.signedUrl || urlData?.publicUrl

    await supabase.from('applicant_documents').insert({
      applicant_id: applicant.id,
      filename: file.name,
      file_path: path,
      file_url: url,
      document_type: docType,
      uploaded_by: staff.id
    })

    progressFill.style.width = '100%'
    input.value = ''
    setTimeout(() => { progress.style.display = 'none'; progressFill.style.width = '0%' }, 1000)
    showSuccess('Document uploaded successfully!')
    loadDocuments()

  } catch(err) {
    progress.style.display = 'none'
    alert('Upload error: ' + err.message)
  }
}

window.deleteDocument = async function(docId, filePath) {
  if (!confirm('Remove this document?')) return
  await supabase.from('applicant_documents').delete().eq('id', docId)
  await supabase.storage.from('transcripts').remove([filePath])
  showSuccess('Document removed.')
  loadDocuments()
}

window.deleteApplicant = async function() {
  if (!confirm(`Are you sure you want to permanently delete ${applicant.full_name}?\n\nThis will remove ALL their data including test results, scores, and placement decisions.\n\nThis action CANNOT be undone.`)) return
  if (!confirm(`Second confirmation: Delete ${applicant.full_name} permanently?`)) return

  try {
    const id = applicant.id
    // Delete in order to respect foreign keys
    await supabase.from('student_answers').delete().in('session_id',
      (await supabase.from('test_sessions').select('id').eq('applicant_id', id)).data?.map(s => s.id) || []
    )
    await supabase.from('test_sessions').delete().eq('applicant_id', id)
    await supabase.from('placement_decisions').delete().eq('applicant_id', id)
    await supabase.from('interview_records').delete().eq('applicant_id', id)
    await supabase.from('placement_tokens').delete().eq('applicant_id', id)
    await supabase.from('applicants').delete().eq('id', id)
    // Also delete transcript from storage if exists
    if (applicant.transcript_url) {
      const path = id + '/'
      await supabase.storage.from('transcripts').remove([path])
    }
    alert(`${applicant.full_name} has been deleted.`)
    window.location.href = 'dashboard.html'
  } catch(err) {
    showSuccess('Error deleting: ' + err.message)
  }
}

init()
</script>
