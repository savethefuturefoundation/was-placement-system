<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — WAAPC Placement System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1117; --gold: #c8943a; --teal: #1d6b6e;
    --paper: #f5f0e8; --cream: #ede7d4; --white: #fff;
    --border: #d4cfc4; --muted: #7a7468; --rust: #a0432a;
    --sidebar: 220px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); }
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar); background: var(--ink); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-brand { padding: 1.5rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand-tag { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.25rem; }
  .sidebar-brand-name { font-family: 'Playfair Display', serif; font-size: 1rem; color: white; line-height: 1.3; }
  .sidebar-nav { flex: 1; padding: 1rem 0; }
  .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1.25rem; color: #8a8278; font-size: 0.85rem; text-decoration: none; border-left: 3px solid transparent; transition: all 0.15s; }
  .nav-item:hover { color: white; background: rgba(255,255,255,0.04); }
  .nav-item.active { color: white; border-left-color: var(--gold); background: rgba(200,148,58,0.08); }
  .sidebar-user { padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 0.6rem; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--teal); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: white; font-weight: 600; flex-shrink: 0; }
  .user-name { font-size: 0.8rem; color: white; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .sign-out-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; }
  .sign-out-btn:hover { color: var(--rust); }
  .main { margin-left: var(--sidebar); min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  .back-link { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
  .back-link:hover { color: var(--teal); }
  .topbar h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .content { padding: 2rem; max-width: 500px; }
  .card { background: var(--white); border: 1px solid var(--border); padding: 2rem; border-top: 3px solid var(--gold); }
  .card-title { font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teal); margin-bottom: 1.5rem; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.35rem; }
  input { width: 100%; border: 1.5px solid var(--border); padding: 0.75rem 0.9rem; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--ink); background: var(--paper); outline: none; transition: border-color 0.2s; }
  input:focus { border-color: var(--teal); background: var(--white); }
  .btn { width: 100%; padding: 0.9rem; background: var(--ink); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
  .btn:hover { background: var(--teal); }
  .btn:disabled { background: var(--border); cursor: not-allowed; }
  .alert { padding: 0.85rem 1rem; font-size: 0.85rem; margin-bottom: 1.25rem; display: none; border-radius: 2px; }
  .alert.success { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
  .alert.error { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
  .strength-bar { height: 4px; background: var(--cream); border-radius: 2px; margin-top: 0.4rem; }
  .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0%; }
  .strength-text { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; }
  .user-info { background: var(--cream); padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.88rem; }
  .user-info strong { color: var(--teal); }
  @media(max-width: 900px) { .sidebar { display: none; } .main { margin-left: 0; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-tag">Placement System</div>
    <div class="sidebar-brand-name">WAAPC<br>American School</div>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span>📋</span> Dashboard</a>
    <a class="nav-item" href="applicant-new.html"><span>➕</span> New Applicant</a>
    <a class="nav-item" href="assessment-builder.html"><span>📝</span> Assessments</a>
    <a class="nav-item" href="placement-review.html"><span>⚖️</span> Placements</a>
    <a class="nav-item active" href="change-password.html"><span>🔑</span> Change Password</a>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar" id="userAvatar">—</div>
    <div class="user-name" id="userName">…</div>
    <button class="sign-out-btn" onclick="handleSignOut()">↩</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <a class="back-link" href="dashboard.html">← Dashboard</a>
    <span style="color:var(--border);">|</span>
    <h1>Change Password</h1>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-title">Update Your Password</div>

      <div class="user-info">
        Logged in as: <strong id="userEmail">…</strong>
      </div>

      <div class="alert success" id="alertSuccess"></div>
      <div class="alert error" id="alertError"></div>

      <div class="field">
        <label>Current Password</label>
        <input type="password" id="currentPassword" placeholder="Your current password" autocomplete="current-password">
      </div>

      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPassword" placeholder="At least 8 characters" oninput="checkStrength(this.value)" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password">
      </div>

      <button class="btn" id="changeBtn" onclick="changePassword()">Update Password</button>
    </div>
  </div>
</main>

<script type="module">
import { supabase, requireAuth, getCurrentStaff, signOut } from '../lib/supabase.js'

let staff = null

window.handleSignOut = signOut

async function init() {
  await requireAuth()
  staff = await getCurrentStaff()
  if (!staff) return
  document.getElementById('userAvatar').textContent = staff.full_name.charAt(0).toUpperCase()
  document.getElementById('userName').textContent = staff.full_name
  document.getElementById('userEmail').textContent = staff.email
}

window.checkStrength = function(password) {
  const fill = document.getElementById('strengthFill')
  const text = document.getElementById('strengthText')
  let strength = 0
  if (password.length >= 8) strength++
  if (password.match(/[A-Z]/)) strength++
  if (password.match(/[0-9]/)) strength++
  if (password.match(/[^A-Za-z0-9]/)) strength++

  const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e']
  const labels = ['', 'Weak', 'Fair', 'Good', 'Strong']
  fill.style.width = (strength * 25) + '%'
  fill.style.background = colors[strength]
  text.textContent = password ? labels[strength] : ''
  text.style.color = colors[strength]
}

window.changePassword = async function() {
  const currentPwd = document.getElementById('currentPassword').value
  const newPwd = document.getElementById('newPassword').value
  const confirmPwd = document.getElementById('confirmPassword').value
  const btn = document.getElementById('changeBtn')
  const successEl = document.getElementById('alertSuccess')
  const errorEl = document.getElementById('alertError')

  successEl.style.display = 'none'
  errorEl.style.display = 'none'

  if (!currentPwd || !newPwd || !confirmPwd) {
    errorEl.textContent = 'Please fill in all fields.'
    errorEl.style.display = 'block'
    return
  }

  if (newPwd.length < 8) {
    errorEl.textContent = 'New password must be at least 8 characters.'
    errorEl.style.display = 'block'
    return
  }

  if (newPwd !== confirmPwd) {
    errorEl.textContent = 'New passwords do not match.'
    errorEl.style.display = 'block'
    return
  }

  if (newPwd === currentPwd) {
    errorEl.textContent = 'New password must be different from your current password.'
    errorEl.style.display = 'block'
    return
  }

  btn.disabled = true
  btn.textContent = 'Updating…'

  try {
    // Verify current password by re-authenticating
    const { data: { user } } = await supabase.auth.getUser()
    const { error: signInError } = await supabase.auth.signInWithPassword({
      email: user.email,
      password: currentPwd
    })

    if (signInError) {
      errorEl.textContent = 'Current password is incorrect.'
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Update Password'
      return
    }

    // Update password
    const { error: updateError } = await supabase.auth.updateUser({ password: newPwd })

    if (updateError) {
      errorEl.textContent = 'Error updating password: ' + updateError.message
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = 'Update Password'
      return
    }

    successEl.textContent = '✅ Password updated successfully! Please use your new password next time you log in.'
    successEl.style.display = 'block'
    document.getElementById('currentPassword').value = ''
    document.getElementById('newPassword').value = ''
    document.getElementById('confirmPassword').value = ''
    document.getElementById('strengthFill').style.width = '0%'
    document.getElementById('strengthText').textContent = ''
    btn.textContent = 'Update Password'
    btn.disabled = false

  } catch(err) {
    errorEl.textContent = 'An error occurred: ' + err.message
    errorEl.style.display = 'block'
    btn.disabled = false
    btn.textContent = 'Update Password'
  }
}

init()
</script>
</body>
</html>
